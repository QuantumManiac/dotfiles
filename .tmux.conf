# ~/.tmux.conf essentials
# See https://fburl.com/tmux for more info.
# === Defaults ===
set -g default-command "${SHELL}"
set -s default-terminal "tmux-256color"
set -s escape-time 0
# Enable true color (24-bit) passthrough
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*256col*:Tc"
# === Essentials ===
set -g mouse on
set -g history-limit 100000
set -g set-clipboard on
set -g focus-events on
setw -g aggressive-resize on
# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1
# C-b is not acceptable -- Vim uses it
set-option -g prefix C-a
bind-key C-a last-window
# === Status Bar ===
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left
# Colors (uses terminal palette)
set -g status-style 'bg=black fg=green bold'
set -g message-style 'bg=black fg=green bold'
set -g mode-style 'bg=green fg=black bold'
# Left: PREFIX indicator + session
set -g status-left-length 80
set -g status-left '#{?client_prefix,[PREFIX] ,}[#S] '
# Right: path + time
set -g status-right-length 200
set -g status-right '#{pane_current_path} '
# Window tabs
setw -g window-status-style 'bg=black fg=white'
setw -g window-status-current-style 'bg=green fg=black bold'
setw -g window-status-separator ' '
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '
# Disable terminal title changes
set -g set-titles off
set -g allow-rename off
setw -g automatic-rename off
set -g allow-set-title off
# Pane borders
set -g pane-border-status top
set -g pane-border-format ' #{pane_title} '
setw -g pane-border-style 'fg=white'
setw -g pane-active-border-style 'fg=green'
